# ═══════════════════════════════════════════════════════════════
# MMI Lab — SSL/Domain Nginx Config
# ═══════════════════════════════════════════════════════════════
# USE THIS FILE *after* you have:
#   1. Pointed your domain DNS (A record) to the server IP
#   2. Obtained SSL certs via certbot (see SOP below)
#
# To activate:
#   1. Replace default.conf with this file (or rename)
#   2. Update DOMAIN_NAME below with your actual domain
#   3. Restart: docker compose restart nginx
# ═══════════════════════════════════════════════════════════════

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    server_name mmilab.tripurauniv.ac.in;

    # Let's Encrypt challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main HTTPS Server ──
server {
    listen 443 ssl http2;
    server_name mmilab.tripurauniv.ac.in;

    # SSL Certificates (Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/mmilab.tripurauniv.ac.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mmilab.tripurauniv.ac.in/privkey.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    client_max_body_size 25M;

    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy API requests to Node.js ──
    location /api/ {
        proxy_pass http://api:3500;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Cache static assets ──
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
    location ~* \.(css|js)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # ── SPA fallback ──
    location / {
        try_files $uri $uri/ /index.html;
    }
}
