services:

  # ── Nginx: Static site + reverse proxy ──
  nginx:
    image: nginx:alpine
    container_name: mmilab-nginx
    ports:
      - "${HOST_PORT:-8080}:80"   # Change HOST_PORT in .env to avoid port conflicts
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Node.js API: Backend + SQLite Database ──
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mmilab-api
    environment:
      - PORT=3500
      - JWT_SECRET=${JWT_SECRET}          # Set in .env file — never hardcode this
      - NODE_ENV=production
      - USER_PASSWORDS=${USER_PASSWORDS}  # Individual passwords — set in .env, never in code
    volumes:
      - mmilab-db:/app/db           # SQLite database (persistent across restarts)
      - mmilab-uploads:/app/uploads # Uploaded documents (persistent across restarts)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3500/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Tailscale Funnel: Permanent public HTTPS URL ──
  # URL stays the same forever (e.g., https://mmilab-server.tail1234.ts.net)
  # Check URL: docker exec mmilab-tunnel tailscale funnel status
  # Auth key in .env (TS_AUTHKEY) — regenerate from Tailscale dashboard if expired
  tunnel:
    image: tailscale/tailscale:latest
    container_name: mmilab-tunnel
    hostname: mmilab-server
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve-config.json
      - TS_USERSPACE=true
    volumes:
      - tailscale-state:/var/lib/tailscale        # Persist Tailscale identity across restarts
      - ./tailscale/serve-config.json:/config/serve-config.json:ro
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  mmilab-db:
    driver: local
  mmilab-uploads:
    driver: local
  tailscale-state:
    driver: local
