services:

  # ── Nginx: Static site + reverse proxy ──
  nginx:
    image: nginx:alpine
    container_name: mmilab-nginx
    ports:
      - "${HOST_PORT:-8080}:80"   # Change HOST_PORT in .env to avoid port conflicts
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/usr/share/nginx/html:ro
    depends_on:
      - api
    restart: unless-stopped

  # ── Node.js API: Backend + SQLite Database ──
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: mmilab-api
    environment:
      - PORT=3500
      - JWT_SECRET=${JWT_SECRET}    # Set in .env file — never hardcode this
      - NODE_ENV=production
    volumes:
      - mmilab-db:/app/db           # SQLite database (persistent across restarts)
      - mmilab-uploads:/app/uploads # Uploaded documents (persistent across restarts)
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3500/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Cloudflare Quick Tunnel: Free public HTTPS URL ──
  # Automatically creates a public URL on trycloudflare.com
  # URL changes on restart — check with: docker logs mmilab-tunnel 2>&1 | grep trycloudflare.com
  # Replace with named tunnel once you have a custom domain.
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: mmilab-tunnel
    command: tunnel --url http://nginx:80
    depends_on:
      - nginx
    restart: unless-stopped

volumes:
  mmilab-db:
    driver: local
  mmilab-uploads:
    driver: local
