<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects — MMI Lab</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* ── Project Entries ── */
        .project-list { margin-top: 40px; }
        .project-entry { border: var(--border-light); display: grid; grid-template-columns: 56px 1fr; margin-top: -1px; background: white; transition: var(--transition); }
        .project-entry:hover { border-color: var(--brand-orange); z-index: 1; position: relative; }
        .project-num-cell { padding: 24px 0; display: flex; align-items: flex-start; justify-content: center; border-right: var(--border-light); color: var(--color-text-secondary); font-family: var(--font-display); font-size: 1.1rem; }
        .project-body { padding: 24px 28px; }
        .project-title { font-size: 1.1rem; font-weight: 500; line-height: 1.4; margin-bottom: 12px; color: var(--color-text); }
        
        .project-details { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
        .project-detail-pill { display: inline-flex; flex-direction: column; background: var(--color-warm-surface); padding: 8px 12px; border-radius: 4px; border: var(--border-light); }
        .project-detail-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--color-text-secondary); letter-spacing: 0.05em; margin-bottom: 2px; }
        .project-detail-value { font-size: 0.85rem; font-weight: 600; color: var(--color-text); }
        
        .project-reference { font-size: 0.85rem; line-height: 1.5; color: var(--color-text-secondary); border-top: 1px dashed var(--color-warm-border); padding-top: 12px; }
        .project-reference b { color: var(--color-text); font-weight: 600; }

        @media (max-width: 767px) {
            .project-entry { grid-template-columns: 1fr; }
            .project-num-cell { display: none; }
        }
    </style>
</head>
<body>
    <nav class="nav"><div class="container nav-inner"><a href="index.html" class="nav-logo"><img src="assets/logo.png" alt="MMI Lab"></a><button class="nav-toggle" aria-label="Menu"><svg width="20" height="20" viewBox="0 0 12 12" fill="none"><path d="M0.75 3H11.25" stroke="currentColor"/><path d="M0.75 6H11.25" stroke="currentColor"/><path d="M0.75 9H11.25" stroke="currentColor"/></svg></button><div class="nav-links"><a href="index.html" class="nav-link text-tag-s">Home</a><a href="research.html" class="nav-link text-tag-s">Research</a><a href="team.html" class="nav-link text-tag-s">Our Team</a><a href="publications.html" class="nav-link text-tag-s">Publications</a><a href="projects.html" class="nav-link text-tag-s active">Projects</a><a href="gallery.html" class="nav-link text-tag-s">Gallery</a><a href="login.html" class="nav-link text-tag-s">Scholar Login</a></div></div></nav>
    <div class="spacer-nav"></div>

    <!-- ═══ HERO ═══ -->
    <section class="hero-dark" style="padding: 80px 0 60px;">
        <div class="container" style="position: relative; z-index: 1;">
            <div class="accent-bar" style="margin-bottom: 24px;"></div>
            <h1 class="text-display">Projects</h1>
            <div style="height: 24px;"></div>
            <p class="text-paragraph-l" style="max-width: 600px;">Experience as Investigator — Completed and Ongoing Projects supported by diverse funding agencies.</p>
        </div>
    </section>

    <!-- ═══ PROJECTS LIST ═══ -->
    <section class="section-warm" style="padding-top: 40px; padding-bottom: 80px;">
